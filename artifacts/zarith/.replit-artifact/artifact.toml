kind = "web"
previewPath = "/"
title = "Zarith VTuber AI"
version = "1.0.0"
id = "artifacts/zarith"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26020

[services.development]
run = "pnpm --filter @workspace/zarith run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zarith", "run", "build" ]
publicDir = "artifacts/zarith/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26020"
BASE_PATH = "/"
